<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Websites</title>
<style>
* { box-sizing: border-box; }
:root {
  --bg: #0f172a;
  --panel: #111827;
  --panel-2: #1f2937;
  --border: #334155;
  --text: #e5e7eb;
  --muted: #94a3b8;
  --accent: #22c55e;
  --danger: #ef4444;
}
body {
  margin: 0;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background: radial-gradient(circle at top right, #1e293b 0%, var(--bg) 45%);
  color: var(--text);
  min-height: 100vh;
}
header {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px 20px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
h1 {
  margin: 0;
  font-size: clamp(1.2rem, 2.5vw, 1.8rem);
}
.actions {
  display: flex;
  gap: 10px;
}
button {
  border: 1px solid var(--border);
  background: var(--panel-2);
  color: var(--text);
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 0.9rem;
}
button:hover { border-color: #64748b; }
#refresh-btn { color: var(--accent); border-color: #166534; }
main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 20px 40px;
}
#status {
  color: var(--muted);
  margin-bottom: 14px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 16px;
}
.card {
  border: 1px solid var(--border);
  background: rgba(17, 24, 39, 0.86);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.card-head {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.url {
  flex: 1;
  font-size: 0.8rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--muted);
}
.delete-btn {
  border-color: #7f1d1d;
  color: #fecaca;
}
.delete-btn:hover {
  border-color: var(--danger);
  color: #fff;
}
.card-body {
  background: #fff;
  height: 340px;
}
.card-body iframe {
  width: 100%;
  height: 100%;
  border: 0;
}
.empty {
  border: 1px dashed var(--border);
  border-radius: 12px;
  color: var(--muted);
  padding: 24px;
  text-align: center;
}
@media (max-width: 480px) {
  .grid { grid-template-columns: 1fr; }
  .card-body { height: 300px; }
}
</style>
</head>
<body>
<header>
  <h1>Demo Folder Website Cards</h1>
  <div class="actions">
    <button id="refresh-btn" type="button">Refresh</button>
  </div>
</header>
<main>
  <div id="status">Loading demo websites...</div>
  <div id="cards" class="grid"></div>
</main>

<script>
const cardsEl = document.getElementById('cards');
const statusEl = document.getElementById('status');
const refreshBtn = document.getElementById('refresh-btn');

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function setStatus(text) {
  statusEl.textContent = text;
}

function makeCard(site) {
  const card = document.createElement('article');
  card.className = 'card';
  card.dataset.slug = site.slug;

  const url = site.url;
  card.innerHTML = ''
    + '<div class="card-head">'
    +   '<a class="url" href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(url) + '</a>'
    +   '<button class="delete-btn" type="button">Delete</button>'
    + '</div>'
    + '<div class="card-body">'
    +   '<iframe loading="lazy" src="' + esc(url) + '" title="' + esc(url) + '"></iframe>'
    + '</div>';

  const deleteBtn = card.querySelector('.delete-btn');
  deleteBtn.addEventListener('click', async function () {
    if (!confirm('Delete demo site folder "' + site.slug + '"?')) return;
    deleteBtn.disabled = true;
    deleteBtn.textContent = 'Deleting...';
    try {
      const res = await fetch('/delete/' + encodeURIComponent(site.slug), { method: 'DELETE' });
      const data = await res.json().catch(function () { return {}; });
      if (!res.ok || !data.ok) {
        throw new Error(data.error || ('HTTP ' + res.status));
      }
      card.remove();
      const remaining = cardsEl.querySelectorAll('.card').length;
      setStatus(remaining + ' demo site' + (remaining === 1 ? '' : 's') + ' remaining');
      if (remaining === 0) {
        cardsEl.innerHTML = '<div class="empty">No demo websites found in the demo folder.</div>';
      }
    } catch (err) {
      alert('Delete failed: ' + err.message);
      deleteBtn.disabled = false;
      deleteBtn.textContent = 'Delete';
    }
  });

  return card;
}

async function loadCards() {
  setStatus('Loading demo websites...');
  cardsEl.innerHTML = '';
  try {
    const res = await fetch('/list');
    const sites = await res.json();
    if (!res.ok) {
      throw new Error((sites && sites.error) || ('HTTP ' + res.status));
    }

    if (!Array.isArray(sites) || sites.length === 0) {
      setStatus('0 demo sites');
      cardsEl.innerHTML = '<div class="empty">No demo websites found in the demo folder.</div>';
      return;
    }

    for (const site of sites) {
      cardsEl.appendChild(makeCard(site));
    }
    setStatus(sites.length + ' demo site' + (sites.length === 1 ? '' : 's'));
  } catch (err) {
    setStatus('Error loading cards');
    cardsEl.innerHTML = '<div class="empty">Could not load demo websites: ' + esc(err.message) + '</div>';
  }
}

refreshBtn.addEventListener('click', loadCards);
loadCards();
</script>
</body>
</html>
